# Ambiente conda do projeto earn-transcricao-reuniao.
#
# Cada dependência pesada entra rastreada por uma DEC, conforme a regra "não
# adicionar dependência sem registro em DEC" (briefing §12.4, SPEC-002 R-FUN-02):
# atualizar este arquivo no mesmo commit da DEC que autoriza a dependência.
#
# Onda 2 — transcrição (passo 01): whisperx + torch (DEC-007, motor),
# pyannote.audio (DEC-008, diarização). torch traz o suporte CUDA; em Linux a
# wheel padrão do pip já inclui CUDA. Versões a fixar conforme a stack estabilizar.
#
# Onda 3 — ata (passo 03): anthropic ainda pendente da sua DEC; não entra aqui.
name: earn-transcricao-reuniao
channels:
  - conda-forge
dependencies:
  - python=3.10
  - pip
  - pip:
      # Versões fixadas: a primeira execução real (REP-002 §3) mostrou que a 3.8.x
      # do whisperx mudou a API de diarização. Pin evita repetir o ajuste noutra máquina.
      - torch==2.8.0          # DEC-007 — backend do WhisperX (CUDA)
      - whisperx==3.8.6       # DEC-007 — motor de transcrição + alinhamento word-level
      - pyannote.audio==4.0.5 # DEC-008 — diarização de falantes
      - jsonschema            # validação do JSON fonte de verdade contra o schema (SPEC-006)
      - pyyaml                # leitura do YAML de configuração da reunião (SPEC-009 §3.1)
